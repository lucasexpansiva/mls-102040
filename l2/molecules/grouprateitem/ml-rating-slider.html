<div class="bg-white dark:bg-slate-900 min-h-screen">
  <div class="mx-auto p-8 font-sans">
    <header class="text-center mb-12">
      <h1 class="text-3xl font-semibold text-slate-800 dark:text-slate-100 mb-2">ML Rating Slider</h1>
      <span class="inline-block px-3 py-1 bg-sky-100 dark:bg-sky-900 text-sky-700 dark:text-sky-300 rounded-full text-sm font-medium">groupRateItem</span>
    </header>
    <widget-playground-state-102020 state='{"playground":{"basic":{"value":3},"helper":{"value":0},"custom":{"value":0},"error":{"value":0,"error":"Please select a rating"},"disabled":{"value":4},"nps":{"value":0}}}'></widget-playground-state-102020>
    <section class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
      <article class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-6">
        <h3 class="text-lg font-semibold text-slate-800 dark:text-slate-100 mb-4">Basic</h3>
        <demo id="demo-basic">
          <grouprateitem--ml-rating-slider value="{{playground.basic.value}}" min="1" max="5">
            <Label>Rate your experience</Label>
          </grouprateitem--ml-rating-slider>
        </demo>
        <details class="mt-4">
          <summary class="cursor-pointer text-sm font-medium text-slate-500 dark:text-slate-400">Properties</summary>
          <div class="mt-2 p-4 border border-slate-200 dark:border-slate-700 rounded-lg dark:bg-slate-900">
            <widget-playground-state-number-102020 label="value" value="{{playground.basic.value}}"></widget-playground-state-number-102020>
          </div>
        </details>
        <details class="mt-2">
          <summary class="cursor-pointer text-sm font-medium text-slate-500 dark:text-slate-400">HTML</summary>
          <div class="mt-2">
            <widget-playground-state-preview-code-102020 target="demo-basic">
              <template>
                <grouprateitem--ml-rating-slider value="{{playground.basic.value}}" min="1" max="5">
                  <Label>Rate your experience</Label>
                </grouprateitem--ml-rating-slider>
              </template>
            </widget-playground-state-preview-code-102020>
          </div>
        </details>
      </article>
      <article class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-6">
        <h3 class="text-lg font-semibold text-slate-800 dark:text-slate-100 mb-4">With Helper</h3>
        <demo id="demo-helper">
          <grouprateitem--ml-rating-slider value="{{playground.helper.value}}">
            <Label>Service quality</Label>
            <Helper>Select a rating from 0 to 5</Helper>
          </grouprateitem--ml-rating-slider>
        </demo>
        <details class="mt-4">
          <summary class="cursor-pointer text-sm font-medium text-slate-500 dark:text-slate-400">Properties</summary>
          <div class="mt-2 p-4 border border-slate-200 dark:border-slate-700 rounded-lg dark:bg-slate-900">
            <widget-playground-state-number-102020 label="value" value="{{playground.helper.value}}"></widget-playground-state-number-102020>
          </div>
        </details>
        <details class="mt-2">
          <summary class="cursor-pointer text-sm font-medium text-slate-500 dark:text-slate-400">HTML</summary>
          <div class="mt-2">
            <widget-playground-state-preview-code-102020 target="demo-helper">
              <template>
                <grouprateitem--ml-rating-slider value="{{playground.helper.value}}">
                  <Label>Service quality</Label>
                  <Helper>Select a rating from 0 to 5</Helper>
                </grouprateitem--ml-rating-slider>
              </template>
            </widget-playground-state-preview-code-102020>
          </div>
        </details>
      </article>
      <article class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-6">
        <h3 class="text-lg font-semibold text-slate-800 dark:text-slate-100 mb-4">Custom Items</h3>
        <demo id="demo-custom">
          <grouprateitem--ml-rating-slider value="{{playground.custom.value}}">
            <Label>Satisfaction level</Label>
            <Item value="1">😠</Item>
            <Item value="2">😐</Item>
            <Item value="3">😊</Item>
          </grouprateitem--ml-rating-slider>
        </demo>
        <details class="mt-4">
          <summary class="cursor-pointer text-sm font-medium text-slate-500 dark:text-slate-400">Properties</summary>
          <div class="mt-2 p-4 border border-slate-200 dark:border-slate-700 rounded-lg dark:bg-slate-900">
            <widget-playground-state-number-102020 label="value" value="{{playground.custom.value}}"></widget-playground-state-number-102020>
          </div>
        </details>
        <details class="mt-2">
          <summary class="cursor-pointer text-sm font-medium text-slate-500 dark:text-slate-400">HTML</summary>
          <div class="mt-2">
            <widget-playground-state-preview-code-102020 target="demo-custom">
              <template>
                <grouprateitem--ml-rating-slider value="{{playground.custom.value}}">
                  <Label>Satisfaction level</Label>
                  <Item value="1">😠</Item>
                  <Item value="2">😐</Item>
                  <Item value="3">😊</Item>
                </grouprateitem--ml-rating-slider>
              </template>
            </widget-playground-state-preview-code-102020>
          </div>
        </details>
      </article>
      <article class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-6">
        <h3 class="text-lg font-semibold text-slate-800 dark:text-slate-100 mb-4">Error State</h3>
        <demo id="demo-error">
          <grouprateitem--ml-rating-slider value="{{playground.error.value}}" error="{{playground.error.error}}">
            <Label>Product rating</Label>
          </grouprateitem--ml-rating-slider>
        </demo>
        <details class="mt-4">
          <summary class="cursor-pointer text-sm font-medium text-slate-500 dark:text-slate-400">Properties</summary>
          <div class="mt-2 p-4 border border-slate-200 dark:border-slate-700 rounded-lg dark:bg-slate-900">
            <widget-playground-state-number-102020 label="value" value="{{playground.error.value}}"></widget-playground-state-number-102020>
            <widget-playground-state-text-102020 label="error" value="{{playground.error.error}}"></widget-playground-state-text-102020>
          </div>
        </details>
        <details class="mt-2">
          <summary class="cursor-pointer text-sm font-medium text-slate-500 dark:text-slate-400">HTML</summary>
          <div class="mt-2">
            <widget-playground-state-preview-code-102020 target="demo-error">
              <template>
                <grouprateitem--ml-rating-slider value="{{playground.error.value}}" error="{{playground.error.error}}">
                  <Label>Product rating</Label>
                </grouprateitem--ml-rating-slider>
              </template>
            </widget-playground-state-preview-code-102020>
          </div>
        </details>
      </article>
      <article class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-6">
        <h3 class="text-lg font-semibold text-slate-800 dark:text-slate-100 mb-4">Disabled</h3>
        <demo id="demo-disabled">
          <grouprateitem--ml-rating-slider value="{{playground.disabled.value}}" disabled="true">
            <Label>Previous rating</Label>
          </grouprateitem--ml-rating-slider>
        </demo>
        <details class="mt-4">
          <summary class="cursor-pointer text-sm font-medium text-slate-500 dark:text-slate-400">Properties</summary>
          <div class="mt-2 p-4 border border-slate-200 dark:border-slate-700 rounded-lg dark:bg-slate-900">
            <widget-playground-state-number-102020 label="value" value="{{playground.disabled.value}}"></widget-playground-state-number-102020>
          </div>
        </details>
        <details class="mt-2">
          <summary class="cursor-pointer text-sm font-medium text-slate-500 dark:text-slate-400">HTML</summary>
          <div class="mt-2">
            <widget-playground-state-preview-code-102020 target="demo-disabled">
              <template>
                <grouprateitem--ml-rating-slider value="{{playground.disabled.value}}" disabled="true">
                  <Label>Previous rating</Label>
                </grouprateitem--ml-rating-slider>
              </template>
            </widget-playground-state-preview-code-102020>
          </div>
        </details>
      </article>
      <article class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-6">
        <h3 class="text-lg font-semibold text-slate-800 dark:text-slate-100 mb-4">NPS Scale</h3>
        <demo id="demo-nps">
          <grouprateitem--ml-rating-slider value="{{playground.nps.value}}" min="0" max="10" step="1" name="nps-score" required="true">
            <Label>How likely are you to recommend us?</Label>
            <Helper>0 = Not likely, 10 = Very likely</Helper>
          </grouprateitem--ml-rating-slider>
        </demo>
        <details class="mt-4">
          <summary class="cursor-pointer text-sm font-medium text-slate-500 dark:text-slate-400">Properties</summary>
          <div class="mt-2 p-4 border border-slate-200 dark:border-slate-700 rounded-lg dark:bg-slate-900">
            <widget-playground-state-number-102020 label="value" value="{{playground.nps.value}}"></widget-playground-state-number-102020>
          </div>
        </details>
        <details class="mt-2">
          <summary class="cursor-pointer text-sm font-medium text-slate-500 dark:text-slate-400">HTML</summary>
          <div class="mt-2">
            <widget-playground-state-preview-code-102020 target="demo-nps">
              <template>
                <grouprateitem--ml-rating-slider value="{{playground.nps.value}}" min="0" max="10" step="1" name="nps-score" required="true">
                  <Label>How likely are you to recommend us?</Label>
                  <Helper>0 = Not likely, 10 = Very likely</Helper>
                </grouprateitem--ml-rating-slider>
              </template>
            </widget-playground-state-preview-code-102020>
          </div>
        </details>
      </article>
    </section>
  </div>
</div>
