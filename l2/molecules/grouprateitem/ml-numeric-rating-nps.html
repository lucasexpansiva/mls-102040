<div class="bg-white dark:bg-slate-900 min-h-screen">

        <demo id="demo-nps">
          <grouprateitem--ml-numeric-rating-nps
            value="{{playground.nps.value}}"
            error="{{playground.nps.error}}"
            min="0"
            max="10"
            step="1"
            required="true">
            <Label>How likely are you to recommend us?</Label>
          </grouprateitem--ml-numeric-rating-nps>
        </demo>
        <details class="mt-4">
          <summary class="cursor-pointer text-sm font-medium text-slate-500 dark:text-slate-400">Properties</summary>
          <div class="mt-2 p-4 border border-slate-200 dark:border-slate-700 rounded-lg dark:bg-slate-900">
            <widget-playground-state-number-102020 label="value" value="{{playground.nps.value}}"></widget-playground-state-number-102020>
            <widget-playground-state-text-102020 label="error" value="{{playground.nps.error}}"></widget-playground-state-text-102020>
          </div>

        <details class="mt-2">
          <summary class="cursor-pointer text-sm font-medium text-slate-500 dark:text-slate-400">HTML</summary>

            <widget-playground-state-preview-code-102020 target="demo-nps">
